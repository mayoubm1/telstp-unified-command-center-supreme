name: Deploy to GitHub Pages

on:
  push:
      branches:
            - main
            - release/*
            jobs:
              build-and-deploy:
                  runs-on: ubuntu-latest
                      steps:
                            - name: Checkout
                                    uses: actions/checkout@v3

                                          - name: Setup Node.js
                                                  uses: actions/setup-node@v3
                                                          with:
                                                                    node-version: '18'

                                                                          - name: Install dependencies
                                                                                  run: pnpm install

                                                                                        - name: Build project
                                                                                                run: pnpm run build

                                                                                                      - name: Upload artifact
                                                                                                              uses: actions/upload-pages-artifact@v4
                                                                                                                      with:
                                                                                                                                path: ./dist
